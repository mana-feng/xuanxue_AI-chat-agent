# Example deploy-only compose file.
# Steps:
# 1) copy this file to docker-compose.deploy.yml
# 2) replace all CHANGE_ME values
# 3) run:
#    docker compose -f docker-compose.deploy.yml pull
#    docker compose -f docker-compose.deploy.yml up -d --pull always --force-recreate

x-images:
  backend: &backend_image yourdockerhub/ai-xuanxue-backend:latest
  frontend: &frontend_image yourdockerhub/ai-xuanxue-frontend:latest
  admin_ui: &admin_image yourdockerhub/ai-xuanxue-admin:latest

x-platform: &platform linux/arm64

x-backend-env: &backend_env
  NODE_ENV: production
  CORS_ORIGINS: https://app.example.com,https://api.example.com
  PORT: "3000"
  DB_HOST: db
  DB_PORT: "3306"
  DB_USER: root
  DB_PASS: CHANGE_ME_DB_PASSWORD
  DB_NAME: bazi_app
  JWT_SECRET: CHANGE_ME_JWT_SECRET_64_PLUS_CHARS
  ACCESS_TOKEN_EXPIRES_IN: 30m
  REFRESH_TOKEN_EXPIRES_DAYS: "15"
  API_SIGNATURE_SECRET: CHANGE_ME_API_SIGNATURE_SECRET_64_PLUS_CHARS
  API_SIGNATURE_TIMESTAMP_WINDOW: "300000"
  REDIS_URL: ""
  REDIS_PREFIX: bazi
  REQUEST_SIZE_LIMIT: "10485760"
  API_SIGNATURE_DISABLED: "false"
  COOKIE_SECURE: "true"
  ALLOW_INSECURE_SECRETS: "false"
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: CHANGE_ME_ADMIN_PASSWORD

x-db-env: &db_env
  MYSQL_ROOT_PASSWORD: CHANGE_ME_DB_ROOT_PASSWORD
  MYSQL_DATABASE: bazi_app

services:
  backend:
    image: *backend_image
    platform: *platform
    pull_policy: always
    restart: always
    environment:
      <<: *backend_env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    image: *frontend_image
    platform: *platform
    pull_policy: always
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

  admin-ui:
    image: *admin_image
    platform: *platform
    pull_policy: always
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - app-network

  db:
    image: mysql:8.0
    platform: *platform
    pull_policy: always
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      <<: *db_env
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
      - ./backend-docker/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
