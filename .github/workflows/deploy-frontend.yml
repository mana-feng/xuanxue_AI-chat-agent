name: Deploy Frontend-Only to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend-only/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-only/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-only

      - name: Build H5
        run: npm run build:h5
        working-directory: frontend-only

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-only/dist/build/h5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
